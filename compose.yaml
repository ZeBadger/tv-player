services:
  tv-player:
    build: .
    depends_on:
      - iptv-epg
    ports:
      - "8080:80"
    volumes:
      - ./epg:/app/epg
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HDHOMERUN_HOST=192.168.0.49   # <-- change to your HDHomeRun's IP address
      - MAX_CONCURRENT_STREAMS=4      # set to your tuner count (e.g. Quatro=4)
#      - TRANSCODE_PRESET=ultrafast
      - TRANSCODE_PRESET=medium
      - TRANSCODE_SCALE=960:-2
      - TRANSCODE_FPS=25
      - TRANSCODE_VIDEO_BITRATE=1800k
      - TRANSCODE_VIDEO_MAXRATE=2200k
      - TRANSCODE_VIDEO_BUFSIZE=4400k
      - TRANSCODE_AUDIO_BITRATE=96k
      # EPG configuration (defaults to local iptv-org sidecar)
      - EPG_SOURCE_URL=http://iptv-epg:3000/guide.xml
      - EPG_CACHE_DIR=/tmp/epg
      - EPG_REFRESH_INTERVAL_HOURS=12
      - EPG_SIDECAR_SERVICE_NAME=iptv-epg
    restart: unless-stopped

  iptv-epg:
    image: ghcr.io/iptv-org/epg:master
    volumes:
      - ./epg:/epg/public
    environment:
      - CRON_SCHEDULE=0 */12 * * *
      - RUN_AT_STARTUP=true
    restart: unless-stopped
